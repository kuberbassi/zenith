services:
  backend:
    build:
      context: ./api-node
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file: .env
    environment:
      - NODE_ENV=development
      - PORT=5001
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ALLOWED_ORIGINS=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:5001
    ports:
      - "3000:80"
    depends_on:
      - backend

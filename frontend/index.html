  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    Theme initialiser — runs synchronously before any CSS paint.
    Reads the saved preference and applies the class to <html> immediately
    so there is zero flash of unstyled content for returning users.
    New visitors get the default: light (no class = :root = light mode).
  -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('zenith_theme');
        var html  = document.documentElement;
        if (saved === 'dark') {
          html.classList.add('dark');
          html.classList.remove('light');
        } else {
          // 'light' or null (first visit) → force light, never follow OS pref
          html.classList.remove('dark');
          html.classList.add('light');
        }
      } catch (e) { /* localStorage blocked (private browsing) — stay light */ }
    })();
  </script>
